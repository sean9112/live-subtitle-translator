name: Build Desktop Artifacts

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS DMG
            os: macos-latest
            command: npm run dist:mac
            artifact_name: macos-dmg
            artifact_path: dist/*.dmg
          - name: Windows Installer
            os: windows-latest
            command: npm run dist:win
            artifact_name: windows-installer
            artifact_path: dist/*.exe
          - name: Linux AppImage
            os: ubuntu-latest
            command: npm run dist:linux
            artifact_name: linux-appimage
            artifact_path: dist/*.AppImage

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Build platform artifact
        run: ${{ matrix.command }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
